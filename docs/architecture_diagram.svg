<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 880" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4285F4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0D652D"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E8710A"/>
    </marker>
  </defs>

  <rect width="1100" height="880" fill="#FAFBFC" rx="8"/>

  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A1A2E">ADK Anomaly Detection Agent -- Architecture</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#80868B">BigQuery ML ARIMA_PLUS + Z-score Statistical Detection</text>

  <rect x="340" y="82" width="420" height="60" rx="30" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="108" text-anchor="middle" font-size="15" font-weight="600" fill="#1A73E8">User (Natural Language)</text>
  <text x="550" y="128" text-anchor="middle" font-size="12" fill="#5F6368">"Show me recent revenue anomalies"</text>

  <line x1="550" y1="142" x2="550" y2="178" stroke="#4285F4" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="100" y="180" width="900" height="300" rx="10" fill="#FFFFFF" stroke="#4285F4" stroke-width="2" filter="url(#shadow)"/>
  <rect x="100" y="180" width="900" height="42" rx="10" fill="#4285F4"/>
  <rect x="100" y="204" width="900" height="18" fill="#4285F4"/>
  <text x="550" y="207" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">anomaly_detection_agent (Gemini 2.5 Flash via AI Studio)</text>

  <rect x="130" y="234" width="840" height="44" rx="6" fill="#F1F3F4" stroke="#DADCE0" stroke-width="1"/>
  <text x="550" y="252" text-anchor="middle" font-size="12" fill="#5F6368">System Instruction: Retail anomaly detection specialist</text>
  <text x="550" y="268" text-anchor="middle" font-size="11" fill="#80868B">Z-score analysis  |  ARIMA_PLUS forecasting  |  Regional and category drill-down  |  Known event cross-reference</text>

  <rect x="130" y="292" width="260" height="60" rx="6" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="260" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#0D652D">get_recent_revenue_anomalies</text>
  <text x="260" y="336" text-anchor="middle" font-size="11" fill="#5F6368">(days: int = 90)</text>

  <rect x="420" y="292" width="260" height="60" rx="6" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="550" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#0D652D">get_recent_stockout_anomalies</text>
  <text x="550" y="336" text-anchor="middle" font-size="11" fill="#5F6368">(days: int = 90)</text>

  <rect x="710" y="292" width="260" height="60" rx="6" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="840" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#0D652D">get_anomaly_detail</text>
  <text x="840" y="336" text-anchor="middle" font-size="11" fill="#5F6368">(sale_date: str)</text>

  <rect x="130" y="366" width="260" height="60" rx="6" fill="#FEF7E0" stroke="#F9AB00" stroke-width="1.5"/>
  <text x="260" y="392" text-anchor="middle" font-size="12" font-weight="600" fill="#E8710A">get_revenue_forecast</text>
  <text x="260" y="410" text-anchor="middle" font-size="11" fill="#5F6368">(horizon_days: int = 30)</text>

  <rect x="420" y="366" width="260" height="60" rx="6" fill="#FEF7E0" stroke="#F9AB00" stroke-width="1.5"/>
  <text x="550" y="392" text-anchor="middle" font-size="12" font-weight="600" fill="#E8710A">get_stockout_forecast</text>
  <text x="550" y="410" text-anchor="middle" font-size="11" fill="#5F6368">(horizon_days: int = 30)</text>

  <rect x="710" y="366" width="260" height="60" rx="6" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="840" y="392" text-anchor="middle" font-size="12" font-weight="600" fill="#0D652D">get_anomaly_summary</text>
  <text x="840" y="410" text-anchor="middle" font-size="11" fill="#5F6368">(full dataset overview)</text>

  <rect x="130" y="440" width="14" height="14" rx="3" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
  <text x="150" y="452" font-size="11" fill="#5F6368">Z-score Detection (SQL Window Functions)</text>
  <rect x="430" y="440" width="14" height="14" rx="3" fill="#FEF7E0" stroke="#F9AB00" stroke-width="1"/>
  <text x="450" y="452" font-size="11" fill="#5F6368">ARIMA_PLUS Forecasting (BigQuery ML)</text>

  <line x1="260" y1="480" x2="260" y2="530" stroke="#0D652D" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="550" y1="480" x2="550" y2="530" stroke="#E8710A" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="840" y1="480" x2="840" y2="530" stroke="#0D652D" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <text x="260" y="516" text-anchor="middle" font-size="10" fill="#0D652D">Fixed SQL</text>
  <text x="550" y="516" text-anchor="middle" font-size="10" fill="#E8710A">ML.FORECAST()</text>
  <text x="840" y="516" text-anchor="middle" font-size="10" fill="#0D652D">Fixed SQL</text>

  <rect x="60" y="532" width="980" height="310" rx="10" fill="#FFFFFF" stroke="#1A73E8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="532" width="980" height="42" rx="10" fill="#1A73E8"/>
  <rect x="60" y="556" width="980" height="18" fill="#1A73E8"/>
  <text x="550" y="559" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">BigQuery (anomaly_detection dataset)</text>

  <rect x="85" y="588" width="340" height="170" rx="8" fill="#FEF7E0" stroke="#F9AB00" stroke-width="1.5"/>
  <text x="255" y="612" text-anchor="middle" font-size="14" font-weight="bold" fill="#E8710A">ARIMA_PLUS Models</text>

  <rect x="105" y="624" width="300" height="54" rx="6" fill="#FFFBF0" stroke="#F9AB00" stroke-width="1"/>
  <text x="255" y="644" text-anchor="middle" font-size="11" font-weight="600" fill="#E8710A">revenue_forecast_model</text>
  <text x="255" y="660" text-anchor="middle" font-size="10" fill="#80868B">ARIMA(1,1,1) | Weekly + Yearly seasonality</text>
  <text x="255" y="674" text-anchor="middle" font-size="10" fill="#80868B">US Holidays | Step changes</text>

  <rect x="105" y="688" width="300" height="54" rx="6" fill="#FFFBF0" stroke="#F9AB00" stroke-width="1"/>
  <text x="255" y="708" text-anchor="middle" font-size="11" font-weight="600" fill="#E8710A">stockout_forecast_model</text>
  <text x="255" y="724" text-anchor="middle" font-size="10" fill="#80868B">ARIMA(0,1,1) | No seasonality detected</text>
  <text x="255" y="738" text-anchor="middle" font-size="10" fill="#80868B">US Holidays | Spikes + dips + steps</text>

  <rect x="455" y="588" width="560" height="226" rx="8" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5"/>
  <text x="735" y="612" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A73E8">Tables</text>

  <rect x="475" y="624" width="250" height="36" rx="5" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1"/>
  <text x="600" y="640" text-anchor="middle" font-size="11" font-weight="600" fill="#202124">fct_daily_sales</text>
  <text x="600" y="654" text-anchor="middle" font-size="10" fill="#80868B">45,650 rows | 5 regions x 5 categories</text>

  <rect x="745" y="624" width="250" height="36" rx="5" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1"/>
  <text x="870" y="640" text-anchor="middle" font-size="11" font-weight="600" fill="#202124">daily_totals</text>
  <text x="870" y="654" text-anchor="middle" font-size="10" fill="#80868B">1,826 rows | Aggregated daily</text>

  <rect x="475" y="672" width="250" height="36" rx="5" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
  <text x="600" y="688" text-anchor="middle" font-size="11" font-weight="600" fill="#0D652D">revenue_anomalies</text>
  <text x="600" y="702" text-anchor="middle" font-size="10" fill="#5F6368">108 detected | 31 matched injected</text>

  <rect x="745" y="672" width="250" height="36" rx="5" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
  <text x="870" y="688" text-anchor="middle" font-size="11" font-weight="600" fill="#0D652D">stockout_anomalies</text>
  <text x="870" y="702" text-anchor="middle" font-size="10" fill="#5F6368">119 detected | 36 matched injected</text>

  <rect x="475" y="720" width="250" height="36" rx="5" fill="#F1F3F4" stroke="#DADCE0" stroke-width="1"/>
  <text x="600" y="736" text-anchor="middle" font-size="11" font-weight="600" fill="#5F6368">anomaly_reference</text>
  <text x="600" y="750" text-anchor="middle" font-size="10" fill="#80868B">10 known events | Ground truth</text>

  <rect x="745" y="720" width="250" height="36" rx="5" fill="#F1F3F4" stroke="#DADCE0" stroke-width="1"/>
  <text x="870" y="736" text-anchor="middle" font-size="10" font-weight="600" fill="#5F6368">Detection: Z-score +/- 2.0 std devs</text>
  <text x="870" y="750" text-anchor="middle" font-size="10" fill="#80868B">30-day rolling average window</text>

  <rect x="85" y="772" width="340" height="50" rx="6" fill="#F1F3F4" stroke="#DADCE0" stroke-width="1"/>
  <text x="255" y="793" text-anchor="middle" font-size="11" font-weight="600" fill="#5F6368">Data Pipeline</text>
  <text x="255" y="810" text-anchor="middle" font-size="10" fill="#80868B">generate_data.py --> CSV --> Cloud Storage --> BigQuery</text>

  <text x="550" y="868" text-anchor="middle" font-size="12" fill="#80868B">5 Years (2020-2024)  |  5 Regions  |  5 Categories  |  $2.92B Revenue  |  10 Known Events  |  Cost: $0</text>
</svg>
